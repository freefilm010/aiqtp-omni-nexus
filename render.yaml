services:
  - type: worker
    name: aiqtp-core-brain
    runtime: python
    rootDir: core-brain
    buildCommand: pip install -r ../requirements.txt
    startCommand: python trading_worker.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://api.alpaca.markets
      - key: ALPACA_PAPER_MODE
        value: false
      - key: ALPACA_SYMBOL_WHITELIST
        value: BTCUSD,ETHUSD
      - key: COINGECKO_API_KEY
        sync: false
      - key: LOOP_INTERVAL_SECONDS
        value: 60
