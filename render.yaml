databases:
  - name: aiqtp-postgres
    plan: free
    databaseName: aiqtp
    user: aiqtp

services:
  # ── Trading Tools API (FastAPI) ───────────────────────────────────────────
  - type: web
    name: aiqtp-trading-service
    runtime: python
    rootDir: trading-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: aiqtp-postgres
          property: connectionString
      # Keep Supabase URL for edge-function calls (record-profit-fee)
      - key: SUPABASE_URL
        value: https://rueaxiyvseaxkysnoock.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://api.alpaca.markets
      - key: ALPACA_PAPER_MODE
        value: "false"
      - key: ALPACA_SYMBOL_WHITELIST
        value: BTCUSD,ETHUSD
      - key: CCXT_LIVE_ENABLED
        value: "false"
      # Tradier (equity broker)
      - key: TRADIER_API_KEY
        sync: false
      - key: TRADIER_ACCOUNT_ID
        sync: false
      - key: TRADIER_SANDBOX_MODE
        value: "true"
      # Binance (crypto)
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: BINANCE_LIVE_ENABLED
        value: "false"
      # Kraken (crypto)
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_SECRET_KEY
        sync: false
      - key: KRAKEN_LIVE_ENABLED
        value: "false"
      # Interactive Brokers (Client Portal Gateway)
      - key: IBKR_CPG_URL
        sync: false
      - key: IBKR_ACCOUNT_ID
        sync: false
      # Stripe payments
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # PayPal payments
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: "live"
      # Anthropic AI proxy
      - key: ANTHROPIC_API_KEY
        sync: false
      # Admin access (comma-separated Supabase user UUIDs)
      - key: ADMIN_USER_IDS
        sync: false

  # ── Core Brain Worker (polling loop) ─────────────────────────────────────
  - type: worker
    name: aiqtp-core-brain
    runtime: python
    rootDir: core-brain
    buildCommand: pip install -r requirements.txt
    startCommand: python trading_worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiqtp-postgres
          property: connectionString
      # Supabase still used as fallback when DATABASE_URL is absent,
      # and for the record-profit-fee edge function call.
      - key: SUPABASE_URL
        value: https://rueaxiyvseaxkysnoock.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://api.alpaca.markets
      - key: ALPACA_PAPER_MODE
        value: "false"
      - key: ALPACA_SYMBOL_WHITELIST
        value: BTCUSD,ETHUSD
      - key: LOOP_INTERVAL_SECONDS
        value: "60"

  # ── Quantum AI Agent ──────────────────────────────────────────────────────
  - type: web
    name: aiqtp-quantum-agent
    runtime: python
    rootDir: core-brain
    buildCommand: pip install fastapi uvicorn[standard] httpx pydantic
    startCommand: python quantum_ai_agent.py
    envVars:
      - key: IBM_QUANTUM_API_KEY
        sync: false
      - key: IBM_QUANTUM_CRN
        sync: false
