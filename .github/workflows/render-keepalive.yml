name: Render keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

env:
  TRADING_SERVICE_URL: "https://aiqtp-trading-service.onrender.com"
  QUANTUM_AGENT_URL: "https://aiqtp-quantum-agent.onrender.com"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping trading-service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TRADING_SERVICE_URL/health" --max-time 30)
          echo "trading-service ping: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping quantum-agent
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$QUANTUM_AGENT_URL/health" --max-time 30)
          echo "quantum-agent ping: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
