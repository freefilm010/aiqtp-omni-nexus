name: Get Project Secrets
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/get-secrets.yml'
jobs:
  get-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Get Supabase project settings
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "=== API KEYS ==="
          curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/rueaxiyvseaxkysnoock/api-keys"
          echo ""
          echo "=== POSTGREST CONFIG ==="
          curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/rueaxiyvseaxkysnoock/config/postgrest"
          echo ""
          echo "=== AUTH CONFIG ==="
          curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/rueaxiyvseaxkysnoock/config/auth"
