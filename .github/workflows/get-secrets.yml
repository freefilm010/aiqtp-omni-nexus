name: Get Project Secrets
on:
  workflow_dispatch:
jobs:
  get-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Get Supabase project settings
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Get API keys from Supabase Management API
          curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/rueaxiyvseaxkysnoock/api-keys" > /tmp/keys.json
          cat /tmp/keys.json
          echo "---"
          # Get project config including JWT secret
          curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/rueaxiyvseaxkysnoock/config/database" > /tmp/config.json
          cat /tmp/config.json
          echo "---"
          curl -s -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/rueaxiyvseaxkysnoock/config/auth" > /tmp/auth.json
          cat /tmp/auth.json
