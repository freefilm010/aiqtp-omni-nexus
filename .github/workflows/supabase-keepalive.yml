name: Supabase keep-alive

on:
  schedule:
    # Ping Supabase every Sunday at 00:00 UTC to prevent the 90-day pause
    - cron: "0 0 * * 0"
  workflow_dispatch:

# Uses the public anon key (already in frontend bundle — not a secret).
# No repository secrets needed.
env:
  SUPABASE_URL: "https://rueaxiyvseaxkysnoock.supabase.co"
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1ZWF4aXl2c2VheGt5c25vb2NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDkwMDEsImV4cCI6MjA4OTQyNTAwMX0.07J92R1g2-ihtnN43iYD63jU3gByBK3otB5zq3haw54"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/")
          echo "Supabase ping status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || exit 1
