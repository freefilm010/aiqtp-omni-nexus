name: Supabase keep-alive

on:
  schedule:
    # Ping every 4 days at 06:00 UTC — Supabase free tier pauses after 7 days
    - cron: "0 6 */4 * *"
  workflow_dispatch:

# Uses the public anon key (already in frontend bundle — not a secret).
# Pulled from GH Actions secret SUPABASE_ANON_KEY so rotation is one-shot.
env:
  SUPABASE_URL: "https://rueaxiyvseaxkysnoock.supabase.co"
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/")
          echo "Supabase ping status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || exit 1

      - name: Ping edge functions (keeps function workers warm)
        run: |
          for fn in qaqi-agent aiqtp-agent get-market-prices faucet-credit; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -H "Content-Type: application/json" \
              -d '{"action":"ping"}' \
              "$SUPABASE_URL/functions/v1/$fn" \
              --max-time 10 || echo "timeout")
            echo "  $fn → $STATUS"
          done

