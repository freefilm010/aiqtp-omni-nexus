name: Supabase Schema Sync

on:
  # Run weekly to capture any schema changes made via Supabase dashboard
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:       # manual trigger anytime

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Pull live DB schema
        run: |
          supabase db pull \
            --project-ref rueaxiyvseaxkysnoock \
            --schema public,auth,storage,extensions \
            --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for schema drift
        id: drift
        run: |
          git diff --quiet supabase/migrations/ && \
            echo "drift=false" >> $GITHUB_OUTPUT || \
            echo "drift=true" >> $GITHUB_OUTPUT

      - name: Commit schema changes if any
        if: steps.drift.outputs.drift == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "chore: sync Supabase schema from live project [auto]

          Schema pulled from rueaxiyvseaxkysnoock.supabase.co
          Any dashboard-applied migrations captured here."
          git push origin main

      - name: Report sync status
        run: |
          if [ "${{ steps.drift.outputs.drift }}" = "true" ]; then
            echo "✅ Schema drift detected and committed to main"
          else
            echo "✅ Schema is in sync — no changes needed"
          fi
