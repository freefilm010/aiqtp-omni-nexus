name: Supabase Full Backup

on:
  schedule:
    - cron: "0 3 * * *"   # Daily 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase project is alive
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "https://rueaxiyvseaxkysnoock.supabase.co/rest/v1/")
          echo "Project status: $STATUS"
          # 200 = active, 401 = active but unauthorized, 503 = paused
          if [ "$STATUS" = "503" ]; then
            echo "⚠️  PROJECT IS PAUSED — needs manual reactivation at supabase.com/dashboard"
            exit 1
          fi
          echo "✅ Project is active"

      - name: List deployed edge functions (verify all 46 are live)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            supabase functions list --project-ref rueaxiyvseaxkysnoock
          else
            echo "SUPABASE_ACCESS_TOKEN not set — skipping function list"
          fi

      - name: Verify all function directories exist in repo
        run: |
          MISSING=0
          for fn in $(ls supabase/functions/ | grep -v _shared); do
            echo "  ✅ $fn"
          done
          echo "All $( ls supabase/functions/ | grep -v _shared | wc -l ) functions present in repo"

      - name: Count migrations
        run: |
          COUNT=$(ls supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "📦 $COUNT SQL migrations in repo"
          ls supabase/migrations/*.sql | tail -5 | xargs -I{} basename {}
