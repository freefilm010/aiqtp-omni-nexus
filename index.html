    <!-- Critical inline CSS to prevent render-blocking -->
    <style>
      :root {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --primary: 217.2 91.2% 59.8%;
        --muted-foreground: 215 20.2% 65.1%;
      }
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
      body{background-color:hsl(222.2 84% 4.9%);color:hsl(210 40% 98%);min-height:100vh}
      #root{min-height:100vh;display:flex;flex-direction:column}
      @keyframes spin{to{transform:rotate(360deg)}}
      .initial-loader{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
      .initial-loader .spinner{width:3rem;height:3rem;border:4px solid hsl(217.2 91.2% 59.8%);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}

    </style>
