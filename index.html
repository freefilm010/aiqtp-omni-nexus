    <!-- Critical inline CSS to prevent render-blocking -->
    <style>
      :root {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --primary: 217.2 91.2% 59.8%;
        --muted-foreground: 215 20.2% 65.1%;
      }
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
      body{background-color:hsl(222.2 84% 4.9%);color:hsl(210 40% 98%);min-height:100vh}
      #root{min-height:100vh;display:flex;flex-direction:column}
      @keyframes spin{to{transform:rotate(360deg)}}
      .initial-loader{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
      .initial-loader .spinner{width:3rem;height:3rem;border:4px solid hsl(217.2 91.2% 59.8%);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
      .initial-loader p{color:hsl(215 20.2% 65.1%)}
    </style>

    <script>
      (() => {
        const bootStateKey = "aiqtp-boot-recovery-v1";
        const isLovablePreview =
          window.location.hostname.includes("lovableproject.com") ||
          window.location.hostname.includes("id-preview--");
        const initialBootTimeoutMs = isLovablePreview ? 20000 : 7000;
        const postBootstrapTimeoutMs = isLovablePreview ? 15000 : 5000;
        window.__AIQTP_APP_BOOTED__ = false;
        window.__AIQTP_BOOTSTRAP_STARTED__ = false;

        const clearStaleAppCaches = async () => {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(
              cacheKeys
                .filter((key) => /workbox|precache|pwa|vite/i.test(key))
                .map((key) => caches.delete(key))
            );
          }
        };

        const triggerRecovery = async () => {
          if (window.__AIQTP_APP_BOOTED__) return;

          try {
            if (sessionStorage.getItem(bootStateKey) === "1") return;
            sessionStorage.setItem(bootStateKey, "1");
            await clearStaleAppCaches();
          } catch {}

          const recoveryUrl = new URL(window.location.href);
          recoveryUrl.searchParams.set("boot-retry", String(Date.now()));
          window.location.replace(recoveryUrl.toString());
        };

        window.addEventListener("load", () => {
          window.setTimeout(() => {
            if (window.__AIQTP_APP_BOOTED__) return;

            if (window.__AIQTP_BOOTSTRAP_STARTED__) {
              window.setTimeout(() => {
                void triggerRecovery();
              }, postBootstrapTimeoutMs);
              return;
            }

            void triggerRecovery();
          }, initialBootTimeoutMs);
        });
      })();
    </script>
