version: "3.8"

# =============================================================================
# AIQTP Omni-Nexus — Complete Self-Hosted Stack
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in 5 secrets
#   docker compose up -d   # starts everything
#
# Public URLs (after deploy):
#   QuantClaw Web UI  → http://localhost:8000  (or your HTTPS domain)
#   Supabase Studio   → http://localhost:3000
#   RAG API           → http://localhost:8001
#   Trading API       → http://localhost:8002
#   Qdrant UI         → http://localhost:6333/dashboard
# =============================================================================

x-common-env: &common-env
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}
  JWT_SECRET: ${JWT_SECRET:-aiqtp-super-secret-jwt-min-32-chars-change-me}
  ANON_KEY: ${ANON_KEY}
  SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.1.0.117
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Auth ────────────────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}@db:5432/postgres"
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3001}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_MAILER_AUTOCONFIRM: "true"

  # ── PostgREST ───────────────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.0.1
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGRST_DB_URI: "postgres://authenticator:${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}@db:5432/postgres"
      PGRST_DB_SCHEMAS: "public,storage,graphql_public"
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ── Realtime ────────────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.28.32
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_realtime_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: realtime-1
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1u2oq}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"

  # ── Storage ─────────────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.0.6
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      rest: { condition: service_started }
    volumes:
      - storage-data:/var/lib/storage
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}@db:5432/postgres"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub

  # ── Kong API Gateway (port 8000 = main entry point) ─────────────────────────
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8000:8000/tcp"
      - "8443:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./docker/kong.yml:/home/kong/kong.yml:ro
    depends_on:
      auth: { condition: service_started }
      rest: { condition: service_started }

  # ── Supabase Studio ─────────────────────────────────────────────────────────
  studio:
    image: supabase/studio:20240101-ce42139
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}
      DEFAULT_ORGANIZATION_NAME: AIQTP
      DEFAULT_PROJECT_NAME: aiqtp-omni-nexus
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    depends_on:
      meta: { condition: service_started }

  # ── Postgres Meta ───────────────────────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.80.0
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-aiqtp_secure_pass_change_me}
    depends_on:
      db: { condition: service_healthy }

  # ── Qdrant Vector DB ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # ── Ollama LLM Backend ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Pull llama3 on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull llama3 &&
             wait"

  # ── RAG Service (OpenClaw Gateway — search + ingest) ───────────────────────
  rag:
    build:
      context: .
      dockerfile: docker/Dockerfile.rag
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./rag-service/repos.yaml:/app/repos.yaml:ro
      - rag-repos:/app/repos
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      LLM_MODEL: ${LLM_MODEL:-llama3}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: 8001
    depends_on:
      qdrant: { condition: service_started }
      ollama: { condition: service_started }

  # ── Trading Tools Service (Freqtrade + ccxt) ────────────────────────────────
  trading-tools:
    build:
      context: .
      dockerfile: docker/Dockerfile.trading
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - trading-data:/app/data
      - ./rag-service/repos.yaml:/app/repos.yaml:ro
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://api.alpaca.markets}
      ALPACA_PAPER_MODE: ${ALPACA_PAPER_MODE:-false}
      CCXT_LIVE_ENABLED: ${CCXT_LIVE_ENABLED:-false}
      PORT: 8002
    depends_on:
      db: { condition: service_healthy }

  # ── AIQTP Core Brain Python Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://api.alpaca.markets}
      ALPACA_PAPER_MODE: ${ALPACA_PAPER_MODE:-false}
      ALPACA_SYMBOL_WHITELIST: ${ALPACA_SYMBOL_WHITELIST:-BTCUSD,ETHUSD}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      LOOP_INTERVAL_SECONDS: ${LOOP_INTERVAL_SECONDS:-60}
    depends_on:
      db: { condition: service_healthy }

volumes:
  db-data:
  storage-data:
  qdrant-data:
  ollama-data:
  rag-repos:
  trading-data:
